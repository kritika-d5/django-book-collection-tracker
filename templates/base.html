{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Athenaeum{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'style.css' %}?v=4">
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

    <nav>
        <a class="nav-brand" href="{% url 'home' %}">Athenaeum</a>
        <button class="nav-toggle" type="button" aria-label="Toggle navigation">Menu</button>

        <div class="nav-links">
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}" class="{% block nav_dashboard %}{% endblock %}">My Shelves</a>
                <a href="{% url 'search' %}" class="{% block nav_search %}{% endblock %}">Search</a>
            {% endif %}
            <a href="{% url 'community_list' %}" class="{% block nav_communities %}{% endblock %}">Communities</a>
        </div>

        <div class="nav-actions">
            {% if user.is_authenticated %}
                <form method="POST" action="{% url 'logout' %}" class="nav-logout-form">
                    {% csrf_token %}
                    <button type="submit" class="nav-logout-btn">Log Out ({{ user.username }})</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Log In</a>
                <a href="{% url 'signup' %}">Sign Up</a>
            {% endif %}
        </div>
    </nav>

    <main>
        <div class="content-panel">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <script src="{% static 'main.js' %}"></script>
</body>
</html>
